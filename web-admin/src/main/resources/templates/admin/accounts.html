<!doctype html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tai khoan</title>
    <link rel="stylesheet" th:href="@{/css/admin.css(v=20260617)}">
</head>
<body>
<div class="app-shell">
    <div th:replace="~{admin/fragments :: sidebar}"></div>
    <main class="content">
        <div class="topbar">
            <div>
                <h1>Tai khoan</h1>
                <p class="muted">Quan ly tai khoan admin va user</p>
            </div>
            <a class="btn secondary" th:href="@{/admin/accounts}">Them moi</a>
        </div>
        <div class="message" th:if="${message}" th:text="${message}"></div>

        <section class="split">
            <form class="panel form" th:action="@{/admin/accounts}" method="post">
                <h2 th:text="${editingAccount.username == null ? 'Them tai khoan' : 'Sua tai khoan'}">Them tai khoan</h2>
                <label>
                    Ten dang nhap
                    <input name="username" th:value="${editingAccount.username}" th:readonly="${editingAccount.username != null}" required>
                </label>
                <label>
                    Mat khau
                    <input name="password" th:value="${editingAccount.password}" required>
                </label>
                <label>
                    Quyen
                    <select name="role">
                        <option th:each="role : ${roles}"
                                th:value="${role}"
                                th:selected="${role == editingAccount.role}"
                                th:text="${role}">
                            user
                        </option>
                    </select>
                </label>
                <button class="btn" type="submit">Luu tai khoan</button>
            </form>

            <div class="table-wrap">
                <table>
                    <thead>
                    <tr>
                        <th>Ten dang nhap</th>
                        <th>Mat khau</th>
                        <th>Quyen</th>
                        <th></th>
                    </tr>
                    </thead>
                    <tbody>
                    <tr th:each="account : ${accounts}">
                        <td th:text="${account.username}">admin</td>
                        <td th:text="${account.password}">1234</td>
                        <td><span class="status" th:text="${account.role}">user</span></td>
                        <td>
                            <div class="actions">
                                <a class="btn small secondary" th:href="@{/admin/accounts(editUsername=${account.username})}">Sua</a>
                                <form th:action="@{/admin/accounts/{username}/delete(username=${account.username})}" method="post">
                                    <button class="btn small danger" type="submit">Xoa</button>
                                </form>
                            </div>
                        </td>
                    </tr>
                    </tbody>
                </table>
            </div>
        </section>
    </main>
</div>
</body>
</html>
