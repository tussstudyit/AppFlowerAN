<!doctype html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>San pham</title>
    <link rel="stylesheet" th:href="@{/css/admin.css(v=20260617)}">
</head>
<body>
<div class="app-shell">
    <div th:replace="~{admin/fragments :: sidebar}"></div>
    <main class="content">
        <div class="topbar">
            <div>
                <h1>San pham</h1>
                <p class="muted">Quan ly san pham va ton kho</p>
            </div>
            <a class="btn secondary" th:href="@{/admin/products}">Them moi</a>
        </div>

        <div class="message" th:if="${message}" th:text="${message}"></div>

        <section class="split">
            <form class="panel form" th:action="@{/admin/products}" method="post" enctype="multipart/form-data">
                <h2 th:text="${editingProduct.id == null ? 'Them san pham' : 'Sua san pham'}">Them san pham</h2>
                <input type="hidden" name="id" th:value="${editingProduct.id}">
                <label>
                    Ten san pham
                    <input name="name" th:value="${editingProduct.name}" required>
                </label>
                <label>
                    Gia
                    <input name="price" type="number" min="0" step="1000" th:value="${editingProduct.price}" placeholder="VD: 140000" required>
                </label>
                <label>
                    So luong kho
                    <input name="stock" type="number" min="0" th:value="${editingProduct.stock}" required>
                </label>
                <label>
                    Danh muc
                    <select name="categoryId">
                        <option value="">Khong chon</option>
                        <option th:each="category : ${categories}"
                                th:value="${category.id}"
                                th:selected="${editingProduct.category != null and editingProduct.category.id == category.id}"
                                th:text="${category.name}">
                            Danh muc
                        </option>
                    </select>
                </label>
                <label>
                    Mo ta
                    <textarea name="description" th:text="${editingProduct.description}"></textarea>
                </label>
                <label>
                    Ghi chu
                    <textarea name="note" th:text="${editingProduct.note}"></textarea>
                </label>
                <label>
                    Anh san pham
                    <input name="image" type="file" accept="image/*">
                </label>
                <button class="btn" type="submit">Luu san pham</button>
            </form>

            <div class="table-wrap">
                <table>
                    <thead>
                    <tr>
                        <th>Anh</th>
                        <th>Ten</th>
                        <th>Gia</th>
                        <th>Kho</th>
                        <th>Danh muc</th>
                        <th></th>
                    </tr>
                    </thead>
                    <tbody>
                    <tr th:each="product : ${products}">
                        <td>
                            <img class="thumb" th:if="${product.imageUrl != null}" th:src="${product.imageUrl}" alt="">
                        </td>
                        <td th:text="${product.name}">San pham</td>
                        <td class="nowrap" th:text="${#numbers.formatDecimal(product.price, 1, 'POINT', 0, 'COMMA') + ' ₫'}">0 ₫</td>
                        <td th:text="${product.stock}">0</td>
                        <td th:text="${product.category != null ? product.category.name : 'Khong co'}">Danh muc</td>
                        <td>
                            <div class="actions">
                                <a class="btn small secondary" th:href="@{/admin/products(editId=${product.id})}">Sua</a>
                                <form th:action="@{/admin/products/{id}/delete(id=${product.id})}" method="post">
                                    <button class="btn small danger" type="submit">Xoa</button>
                                </form>
                            </div>
                        </td>
                    </tr>
                    </tbody>
                </table>
            </div>
        </section>
    </main>
</div>
</body>
</html>
