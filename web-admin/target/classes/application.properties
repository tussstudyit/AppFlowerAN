spring.application.name=appshopbanhang-web-admin
server.port=8080

spring.datasource.url=jdbc:mariadb://localhost:3306/appshopbanhang?useUnicode=true&characterEncoding=utf8
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=org.mariadb.jdbc.Driver

spring.jpa.hibernate.ddl-auto=none
spring.jpa.hibernate.naming.physical-strategy=org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl
spring.jpa.hibernate.naming.implicit-strategy=org.hibernate.boot.model.naming.ImplicitNamingStrategyLegacyJpaImpl
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.jdbc.time_zone=Asia/Ho_Chi_Minh

spring.servlet.multipart.max-file-size=12MB
spring.servlet.multipart.max-request-size=24MB
app.image-storage-dir=uploads/images

server.servlet.encoding.charset=UTF-8
server.servlet.encoding.enabled=true
server.servlet.encoding.force=true
spring.web.resources.cache.period=0
spring.web.resources.chain.cache=false

vnpay.tmn-code=${VNPAY_TMN_CODE:GW923J6D}
vnpay.hash-secret=${VNPAY_HASH_SECRET:G88M0L3JT3NMQ8F05U19RG1UPUE3MZK8}
vnpay.pay-url=${VNPAY_PAY_URL:https://sandbox.vnpayment.vn/paymentv2/vpcpay.html}
vnpay.return-url=${VNPAY_RETURN_URL:http://localhost:8080/api/payments/vnpay/return}
vnpay.ipn-url=${VNPAY_IPN_URL:http://localhost:8080/api/payments/vnpay/ipn}
vnpay.default-bank-code=${VNPAY_DEFAULT_BANK_CODE:}
vnpay.version=2.1.0
vnpay.command=pay
vnpay.currency=VND
vnpay.locale=vn
vnpay.order-type=other
