<!doctype html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dang nhap Admin</title>
    <link rel="stylesheet" th:href="@{/css/admin.css(v=20260617)}">
</head>
<body>
<main class="login-page">
    <section class="login-box">
        <h1>Web Admin</h1>
        <p class="muted">Quan tri du lieu cho AppShopBanHang</p>
        <div class="error" th:if="${error}" th:text="${error}"></div>
        <form class="form" th:action="@{/admin/login}" method="post">
            <label>
                Ten dang nhap
                <input name="username" autocomplete="username" required autofocus>
            </label>
            <label>
                Mat khau
                <input name="password" type="password" autocomplete="current-password" required>
            </label>
            <button class="btn" type="submit">Dang nhap</button>
        </form>
    </section>
</main>
</body>
</html>
