<!doctype html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Don hang</title>
    <link rel="stylesheet" th:href="@{/css/admin.css(v=20260617)}">
</head>
<body>
<div class="app-shell">
    <div th:replace="~{admin/fragments :: sidebar}"></div>
    <main class="content">
        <div class="topbar">
            <div>
                <h1>Don hang</h1>
                <p class="muted">Theo doi va cap nhat trang thai don hang</p>
            </div>
        </div>
        <div class="message" th:if="${message}" th:text="${message}"></div>

        <div class="table-wrap">
            <table>
                <thead>
                <tr>
                    <th>Ma don</th>
                    <th>Tai khoan</th>
                    <th>Khach hang</th>
                    <th>SDT</th>
                    <th>Tong tien</th>
                    <th>Ngay dat</th>
                    <th>Thanh toan</th>
                    <th>Trang thai</th>
                    <th></th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="order : ${orders}">
                    <td th:text="${order.id}">1</td>
                    <td th:text="${order.username}">user</td>
                    <td th:text="${order.customerName}">Khach</td>
                    <td th:text="${order.phone}">000</td>
                    <td th:text="${#numbers.formatDecimal(order.total, 1, 'POINT', 0, 'COMMA') + ' ₫'}">0 ₫</td>
                    <td class="nowrap" th:text="${order.orderDate}">date</td>
                    <td>
                        <span class="status" th:text="${(order.paymentMethod ?: 'COD') + ' - ' + (order.paymentStatus ?: 'UNPAID')}">COD</span>
                    </td>
                    <td><span class="status" th:text="${order.status}">Trang thai</span></td>
                    <td><a class="btn small secondary" th:href="@{/admin/orders/{id}(id=${order.id})}">Chi tiet</a></td>
                </tr>
                </tbody>
            </table>
        </div>
    </main>
</div>
</body>
</html>
